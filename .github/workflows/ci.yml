name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-analyze:
    name: Build, Test, Lint and Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        run: mvn clean test

      - name: Linting (Checkstyle)
        run: mvn checkstyle:check || true

      - name: Static Analysis (PMD)
        run: mvn pmd:check || true
