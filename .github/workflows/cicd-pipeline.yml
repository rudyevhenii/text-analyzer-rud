name: CI/CD Multi-Stage Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Stage 1: Test
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Tests
        run: mvn clean test

  # Stage 2: Build
  build:
    name: Build Artifact
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build JAR (Skip Tests)
        run: mvn clean package -DskipTests
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: target/*.jar
          retention-days: 1

  # Stage 3: Deploy to Staging
  deploy_staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact
      - name: Simulate Staging Deploy
        run: |
          echo "🚀 Deploying artifact to STAGING environment..."
          ls -la
          echo "Deployment successful."

  # Stage 4: Verify Staging
  verify_staging:
    name: Verify Staging (Smoke Test)
    needs: deploy_staging
    runs-on: ubuntu-latest
    steps:
      - name: Run Smoke Test Simulation
        run: |
          echo "🔍 Running smoke tests on staging..."
          if [ 1 -eq 1 ]; then
            echo "✅ Smoke test passed. Staging is healthy."
            exit 0
          else
            echo "❌ Smoke test failed! The app didn't start properly."
            exit 1
          fi

  # Stage 5: Deploy to Production
  deploy_production:
    name: Deploy to Production
    needs: verify_staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact
      - name: Simulate Production Deploy
        run: |
          echo "🚀 Deploying artifact to PRODUCTION environment..."
          ls -la
          echo "Production deployment complete!"
