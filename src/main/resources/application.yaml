spring:
  application:
    name: text-analyzer-rud

  h2:
    console:
      enabled: true

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:text_analyzer
    username: sa
    password:

  jpa:
    show-sql: true

  sql:
    init:
      schema-locations: classpath:sql/schema.sql

text_analyzer:
  word_frequency: 3
